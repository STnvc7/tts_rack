defaults:
  - _self_
  - vocoder/discriminator: hifi_gan
  - optimizer: adam_w
  - scheduler: exponential

name: vits

data_module:
  _target_: data.TTSDataModule
  corpus: ${corpus.config}
  dsp_processor: ${dsp.config}
  text_processor: ${text.config}
  features_to_extract: [log_spectrogram]
  require_duration: false
  segment_size: ${general.segment_size} 
  trim: forward
  normalize: loudness
  batch_size: ${general.batch_size}
  num_workers: 12
  pin_memory: true
  
lightning_module:
  _target_: engine.e2e.E2EEngine
  model:
    _target_: engine.e2e.vits.VITS
    n_vocab: ${text.config.n_phonemes}
    fft_size: ${dsp.config.fft_size}
    inter_channels: 192
    hidden_channels: 192
    filter_channels: 768
    n_heads: 2
    n_layers: 6
    kernel_size: 3
    p_dropout: 0.1
    resblock_kernel_sizes: [3, 7, 11]
    resblock_dilation_sizes: [[1,3,5], [1,3,5], [1,3,5]]
    upsample_rates: [8, 8, 2, 2]
    upsample_initial_channel: 512
    upsample_kernel_sizes: [16, 16, 4, 4]
    n_speakers: ${corpus.config.n_speakers}
    gin_channels: 256
    use_sdp: true
    
  discriminator: ${engine.vocoder.discriminator}
  loss:
    _target_: engine.e2e.vits.VITSLoss
    sample_rate: ${dsp.config.sample_rate}
    fft_size: ${dsp.config.fft_size}
    hop_size: ${dsp.config.hop_size}
    n_mels: ${dsp.config.n_mels}
    lambda_mel: 45
    lambda_adv: 1.
    lambda_fm: 1.
    lambda_kl: 1.
    lambda_dur: 1.
  discriminator_loss:
    _target_: engine.vocoder.hifi_gan.HiFiGANDiscriminatorLoss
  optimizer: ${engine.optimizer}
  scheduler: ${engine.scheduler}
  dsp_processor: ${dsp.config}
  valid_metrics:
    _target_: metric_board.Evaluator
    metrics:
      spectrogram:
        _target_: metric_board.metrics.Spectrogram
        fft_size: ${dsp.config.fft_size}
        hop_size: ${dsp.config.hop_size}
        distance: mae
      mel_spectrogram:
        _target_: metric_board.metrics.MelSpectrogram
        sample_rate: ${dsp.config.sample_rate}
        fft_size: ${dsp.config.fft_size}
        hop_size: ${dsp.config.hop_size}
        n_mels: ${dsp.config.n_mels}
        distance: mae
  test_metrics: ${metrics}
  exp_path: ${general.exp_path}
  controls: null
  n_valid_log_samples: 8
  n_test_save_samples: 20