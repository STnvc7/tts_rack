defaults:
  - _self_
  - vocoder/discriminator: univnet
  - optimizer: adam_w
  - scheduler: exponential

name: ddspeech

data_module:
  _target_: data.TTSDataModule
  corpus: ${corpus.config}
  dsp_processor: ${dsp.config}
  text_processor: ${text.config}
  features_to_extract: [mel_spectrogram, pitch]
  require_duration: false
  segment_size: ${general.segment_size} 
  trim: forward
  normalize: loudness
  batch_size: ${general.batch_size}
  num_workers: 12
  pin_memory: true
  
lightning_module:
  _target_: engine.e2e.E2EEngine
  model:
    _target_: engine.e2e.ddspeech.DDSpeech
    n_phonemes: ${text.config.n_phonemes}
    sample_rate: ${dsp.config.sample_rate}
    fft_size: ${dsp.config.fft_size}
    hop_size: ${dsp.config.hop_size}
    n_mels: ${dsp.config.n_mels}
    n_harmonics: 64
    n_samples: 256
    n_bands: 128
    n_timesteps: 4
    channels: 64
    h_channels: 128
    transformer_kernel_size: 1
    transformer_n_layers: 6
    transformer_n_groups: 1
    transformer_n_heads: 4
    transformer_p_dropout: 0.1
    convnext_kernel_size: 7
    convnext_n_layers: 8
    convnext_n_groups: 2
    periodic_head: wavetable
    aperiodic_head: ltv
    mel_stats: ${corpus.config.feature_stats.mel_spectrogram}
    pitch_stats: ${corpus.config.feature_stats.pitch}
  discriminator: ${engine.vocoder.discriminator}
  loss:
    _target_: engine.e2e.ddspeech.DDSpeechLoss
    sample_rate: ${dsp.config.sample_rate}
    fft_size: ${dsp.config.fft_size}
    hop_size: ${dsp.config.hop_size}
    n_mels: ${dsp.config.n_mels}
    lambda_mel: 45
  discriminator_loss:
    _target_: engine.vocoder.hifi_gan.HiFiGANDiscriminatorLoss
  optimizer: ${engine.optimizer}
  scheduler: ${engine.scheduler}
  dsp_processor: ${dsp.config}
  valid_metrics:
    _target_: metric_board.Evaluator
    metrics:
      spectrogram:
        _target_: metric_board.metrics.Spectrogram
        fft_size: ${dsp.config.fft_size}
        hop_size: ${dsp.config.hop_size}
        distance: mae
      mel_spectrogram:
        _target_: metric_board.metrics.MelSpectrogram
        sample_rate: ${dsp.config.sample_rate}
        fft_size: ${dsp.config.fft_size}
        hop_size: ${dsp.config.hop_size}
        n_mels: ${dsp.config.n_mels}
        distance: mae
  test_metrics: ${metrics}
  exp_path: ${general.exp_path}
  controls: null
  n_valid_log_samples: 8
  n_test_save_samples: 20